name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *" # Executa a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # A action gera os arquivos pacman-contribution-graph.svg 
          # e pacman-contribution-graph-dark.svg automaticamente

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: . # Mudei de 'dist' para '.' (raiz) onde os arquivos são gerados
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
